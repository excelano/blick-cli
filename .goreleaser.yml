# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: blick
    main: .
    binary: blick
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: blick
    name_template: "blick_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - setup.sh

nfpms:
  - id: blick
    package_name: blick
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      Microsoft 365 status panel for the terminal.
      Single-screen view: unread Outlook mail, unread Teams chats, next
      meeting. Reply, mark-read, mark-all-read, refresh, today's calendar
      inline. Pure Go, device-code OAuth, requires your own Azure app
      registration (see /usr/share/doc/blick/setup.sh).
    homepage: https://github.com/excelano/blick-cli
    license: MIT
    formats:
      - deb
    section: mail
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/blick/copyright
      - src: ./README.md
        dst: /usr/share/doc/blick/README.md
      - src: ./SECURITY.md
        dst: /usr/share/doc/blick/SECURITY.md
      - src: ./setup.sh
        dst: /usr/share/doc/blick/setup.sh

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship install.sh alongside the platform tarballs so users can pin to a
  # specific release URL instead of relying on the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

brews:
  - name: blick
    repository:
      owner: excelano
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://excelano.com/blick-cli/"
    description: "Check Microsoft 365 mail, Teams chats, and next meeting from the terminal"
    license: "MIT"
    install: |
      bin.install "blick"
    test: |
      system "#{bin}/blick", "--version"
