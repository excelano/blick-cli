# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: checkin
    main: .
    binary: checkin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: checkin
    name_template: "checkin_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - setup.sh

nfpms:
  - id: checkin
    package_name: checkin
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      Microsoft 365 check-in tool for the terminal.
      Single-screen status panel: unread Outlook mail, pending Teams chats,
      next meeting. Reply, mark-read, mark-all-read, refresh inline. Pure
      Go, device-code OAuth, requires your own Azure app registration
      (see /usr/share/doc/checkin/setup.sh).
    homepage: https://github.com/excelano/checkin-cli
    license: MIT
    formats:
      - deb
    section: mail
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/checkin/copyright
      - src: ./README.md
        dst: /usr/share/doc/checkin/README.md
      - src: ./SECURITY.md
        dst: /usr/share/doc/checkin/SECURITY.md
      - src: ./setup.sh
        dst: /usr/share/doc/checkin/setup.sh

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship install.sh alongside the platform tarballs so users can pin to a
  # specific release URL instead of relying on the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
